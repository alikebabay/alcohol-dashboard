<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Graph Admin</title>
<link rel="stylesheet" href="/static/admin.css">
<link rel="stylesheet" href="/static/offer.css">
<script src="/static/render_offer.js"></script>
</head>

<body>

<h2>Graph Admin</h2>

<div class="container">
    <div class="left">

        <!-- SUPPLIERS -->
        <div class="section-block">
            <h3>Suppliers</h3>

            <div id="supplier_grid"></div>

            <div id="active_supplier"
                 style="font-weight:bold; margin-top:10px; margin-bottom:10px;">
            </div>

            <div class="menu">
                <div class="menu-item" onclick="loadSuppliers()">⟳ Reload Suppliers</div>                

                <div id="btn_change_supplier" class="menu-item"
                     style="display:none;" onclick="resetState()">
                    ❎ Change Supplier
                </div>

                <div id="btn_toggle_excluded"
                    class="menu-item warning"
                    style="display:none;"
                    onclick="toggleExcluded()">
                    🚫 Exclude from pivot
                </div>

                <div id="btn_rebuild_sheets"
                    class="menu-item warning"
                    onclick="rebuildSheets()">
                    🔄 Rebuild Sheets
                </div>

                <div id="btn_nodes" class="menu-item"
                     style="display:none;" onclick="loadNodes()">
                    🔍 Find Nodes
                </div>

                <div id="btn_offers" class="menu-item"
                     style="display:none;" onclick="loadOffers()">
                    📦 View Offers
                </div>

                <div id="btn_remove" class="menu-item danger"
                     style="display:none;" onclick="removeSupplier()">
                    ❌ Remove Supplier
                </div>

                <div id="btn_dfout" class="menu-item danger"
                     style="display:none;" onclick="deleteDfOut()">
                    🗑 Delete all DfOut
                </div>
            </div>
        </div>

        <!-- Mark DfOut as canonical -->
        <div class="section-block" id="dfout_block">
            <h3>Blob ID / DfOut</h3>
            <input id="dfout_id" placeholder="DfOut ID" />
            <button onclick="markCanonical()">⭐ Mark Canonical</button>
        </div>

        <!-- BRAND -->
        <div class="section-block">
            <h3>Brand</h3>
            <input id="brand" placeholder="Brand name" />
            <button onclick="findBrand()">🔍 Find Brand</button>
        </div>

    </div>

    <div class="right">
        <!-- OUTPUT -->
        <div class="section-block">
            <h3>Output</h3>
            <div id="output" class="result"></div>
        </div>
    </div>
</div>




<script>

//connection to api
let API_BASE = null;
let state = 0;              // 0 = idle, 1 = supplier selected, 2 = nodes view
let viewMode = "nodes";    // nodes | offers
let activeSupplier = null;  // stored selected supplier
let lastNodes = [];          // cached nodes for state 2
let lastOffers = [];        // cached offers
let canonicalIds = new Set();  //cached canonicals for state 2
let supplierExcluded = false; //managing states for suppliers



async function loadConfig() {
    try {
        const res = await fetch("/admin/config");
        const cfg = await res.json();
        API_BASE = cfg.api_base;
    } catch (e) {
        // fallback for FILE:// usage
        API_BASE = "http://localhost:8001/admin";
    }
}

//populates supplier dropdown
async function loadSuppliers() {
    const data = await api("/list_suppliers", "GET", null, false);
    const grid = document.getElementById("supplier_grid");

    grid.innerHTML = "";

    if (!Array.isArray(data)) {
        grid.innerHTML = "<div>Error loading suppliers</div>";
        return;
    }

    data.forEach(row => {
        const div = document.createElement("div");
        div.className = "supplier-item";
        div.innerText = row.name + (row.admin_excluded ? " 🚫" : "");
        //reloads supplier data on active supplier switch
        div.onclick = () => {
            if (activeSupplier !== row.name) {
                // supplier context changed → invalidate output
                lastNodes = [];
                lastOffers = [];
                document.getElementById("output").innerHTML = "";
                viewMode = "nodes";
            }

            activeSupplier = row.name;
            supplierExcluded = !!row.admin_excluded;
            state = 1;

            renderState();
            highlightActiveSupplier();
        };


        grid.appendChild(div);
    });

    highlightActiveSupplier();
}

function highlightActiveSupplier() {
    document.querySelectorAll(".supplier-item").forEach(el => {
        el.classList.toggle("active", el.innerText === activeSupplier);
    });
}

//manages suppliers
async function toggleExcluded() {
    if (!activeSupplier) return;

    const newState = !supplierExcluded;

    await api(
        "/set_supplier_excluded",
        "POST",
        {
            supplier: activeSupplier,
            excluded: newState
        }
    );

    supplierExcluded = newState;

    showToast(
        newState
            ? "Supplier excluded from pivot"
            : "Supplier included in pivot"
    );

    await loadSuppliers();   // refresh 🚫 badge
    renderState();
}

async function rebuildSheets() {
    if (!confirm("Rebuild Google Sheets master?\nThis may take some time.")) {
        return;
    }

    showToast("Rebuilding Sheets...");

    const res = await api(
        "/rebuild_sheets",
        "POST",
        null,
        true   // show result in output
    );

    if (res && res.ok) {
        showToast(`Sheets rebuilt (${res.rows} rows)`);
    } else {
        showToast("Sheets rebuild finished (check output)");
    }
}

// backend calls
async function api(path, method="GET", body=null, updateOutput=true) {
    let opts = { method, headers: {"Content-Type": "application/json"} };
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(API_BASE + path, opts);
    const data = await res.json().catch(()=>({error:"Invalid JSON"}));
    if (updateOutput)
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    return data;
}

function listSuppliers(){
    api("/list_suppliers", "GET");
}

function removeSupplier(){
    if (!confirm("Remove supplier: " + activeSupplier + " ?")) return;
    api("/remove_supplier", "POST", { name: activeSupplier });
}

function findNodes() {
    loadNodes();
}

async function loadNodes() {
    viewMode = "nodes";
    await loadCanonicals();
    const data = await api(
        "/find_nodes?supplier=" + encodeURIComponent(activeSupplier),
        "GET",
        null,
        false
    );
    lastNodes = data;
    state = 2;
    renderState();
}

// loads supplier offers
async function loadOffers() {
    const data = await api(
        "/list_offers?supplier=" + encodeURIComponent(activeSupplier),
        "GET",
        null,
        false
    );
    lastOffers = data;
    viewMode = "offers";
    state = 2;
    renderState();
}

//removes DFOUt, returns user to state 2
async function deleteDfOut() {
    await api("/delete_dfout", "POST", { supplier: activeSupplier });

    // Load nodes immediately → switches state to 2 inside loadNodes()
    await loadNodes();
}

//removes nodes by provided id
function deleteById() {
    const id = document.getElementById("dfout_id").value.trim();
    if (!id) return;

    if (!confirm("Delete node with id:\n" + id + " ?")) return;

    api("/delete_node", "POST", { id });
}


function markCanonical(){
    const id = document.getElementById("dfout_id").value.trim();
    api("/mark_canonical", "POST", { id });
}

async function loadCanonicals() {
    const data = await api("/list_canonicals", "GET", null, false);
    canonicalIds = new Set(Array.isArray(data) ? data : []);
}


function findBrand(){
    const brand = document.getElementById("brand").value.trim();
    api("/find_brand?name=" + encodeURIComponent(brand), "GET");
}

function resetState() {
    if (state === 2) {
        // go back only to supplier mode
        state = 1;
        renderState();
        return;
    }
    activeSupplier = null;
    state = 0;
    
    renderState();
}

//adds event log for user
async function loadEventLog() {
    const res = await api("/event_log", "GET", null, false);
    const out = document.getElementById("output");

    if (!res.events) {
        out.innerText = "No logs.";
        return;
    }

    out.innerHTML = res.events
        .map(ev => `<div class="event-item">${ev}</div>`)
        .join("");
}

//event handler for delete button

document.addEventListener("click", async (e) => {
    const btn = e.target.closest(".node-delete");
    if (!btn) return;

    // works for BOTH .node-item and .offer-card
    const card = btn.closest("[data-id]");
    if (!card) return;

    const id = card.dataset.id;
    if (!id) return;

    if (!confirm("Delete node?\n" + id)) return;

    await api("/delete_node", "POST", { id }, false);

    // refresh current view (offers stay offers)
    if (viewMode === "offers") await loadOffers();
    else await loadNodes();
});

//event handler for download button
document.addEventListener("click", (e) => {
    const btn = e.target.closest(".node-download");
    if (!btn) return;

    const card = btn.closest("[data-id]");
    if (!card) return;

    const id = card.dataset.id;
    if (!id) return;

    // trigger browser download
    window.location = API_BASE + "/download/" + encodeURIComponent(id);
});


function renderState() {
    const s = state;
    const lbl  = document.getElementById("active_supplier");
    const btnC = document.getElementById("btn_change_supplier");
    const rm   = document.getElementById("btn_remove");
    const nd   = document.getElementById("btn_nodes");
    const df   = document.getElementById("btn_dfout");
    const dfoutBlock = document.getElementById("dfout_block");


    if (s === 0) { 
    lbl.innerText = "Event Log";

    btnC.style.display = "none";
    rm.style.display   = "none";
    nd.style.display   = "none";
    df.style.display   = "none";
    document.getElementById("btn_offers").style.display = "none";

    // hide DFOUT tools in idle
    dfoutBlock.style.display = "none";
    
    //manage suppliers
    document.getElementById("btn_toggle_excluded").style.display = "none";

    // show event log
    const out = document.getElementById("output");
    out.style.display = "block";
    loadEventLog();
    return;
    }


    if (s === 1) { // supplier selected state
        lbl.innerText = "Active supplier: " + activeSupplier;
        btnC.style.display = "block"; //change supplier
        rm.style.display   = "block"; //remove supplier
        nd.style.display   = "block"; //find all nodes for supplier
        df.style.display   = "block"; //turns deletedf out button display

        dfoutBlock.style.display = "block";
        document.getElementById("btn_offers").style.display = "block";
        document.getElementById("output").style.display = "block";
        //manage suppliers
        const ex = document.getElementById("btn_toggle_excluded");
        ex.style.display = "block";
        ex.innerText = supplierExcluded
            ? "✅ Include in pivot"
            : "🚫 Exclude from pivot";

        return;
    }

    if (s === 2) {   // NODES VIEW
        lbl.innerText = "Nodes for: " + activeSupplier;
        btnC.style.display = "block";
        rm.style.display   = "block";
        nd.style.display   = "block";
        df.style.display   = "block";

        dfoutBlock.style.display = "block";

        const out = document.getElementById("output");
        out.style.display = "block";

        //manage suppliers
        const ex = document.getElementById("btn_toggle_excluded");
        ex.style.display = "block";
        ex.innerText = supplierExcluded
            ? "✅ Include in pivot"
            : "🚫 Exclude from pivot";

        // OFFERS VIEW
        if (viewMode === "offers") {
            out.innerHTML = lastOffers
                .filter(o => o.type === "Offer")
                .map(o => window.renderOfferCard(o))
                .join("");
            return;
        }

    // Render NODES (separate pipeline)
    out.innerHTML = lastNodes.map(n => {
        const id = n.id || "?";
        const name = n.name || "";

        let cls = "node-other";
        const t = (n.type || "").toLowerCase();

        if (t === "offer") cls = "node-offer";
        else if (t === "dfout") cls = "node-dfout";
        else if (t === "dfraw") cls = "node-dfraw";
        else if (t === "rawblob") cls = "node-rawblob";
        else if (t === "brand") cls = "node-brand";

        const isCanonical =
            t === "dfout" && canonicalIds.has(id);

        const badge = isCanonical
            ? `<div class="badge-canonical">⭐ canonical</div>`
            : "";

        return `
            <div class="node-item ${cls}" data-id="${id}">
                <div>
                    <b>${n.type}</b>${badge}
                </div>

                <div>
                    ID: <span class="copy-id" data-id="${id}">${id}</span>
                </div>

                <div>
                    <b>${name}</b>
                </div>
                <button class="node-download" title="Download">⬇</button>
                <button class="node-delete" title="Delete">🗑</button>
            </div>

        `;
    }).join("");

    // enable click to copy (nodes only)
    document.querySelectorAll(".copy-id").forEach(el => {
        el.onclick = () => {
            navigator.clipboard.writeText(el.dataset.id);
            el.style.color = "green";
            setTimeout(() => el.style.color = "blue", 800);
            showToast("Copied!");
        };
    });


        return;
    }
}

// Auto-connect to api when page loads
window.onload = async () => {
    await loadConfig();
    await loadSuppliers();
    renderState();
};

//helper to display copid when id is copied
function showToast(msg) {
    const t = document.createElement("div");
    t.innerText = msg;
    t.style.position = "fixed";
    t.style.bottom = "20px";
    t.style.right = "20px";
    t.style.background = "black";
    t.style.color = "white";
    t.style.padding = "10px 16px";
    t.style.borderRadius = "6px";
    t.style.opacity = "0";
    t.style.transition = "opacity 0.25s ease";
    t.style.zIndex = 9999;

    document.body.appendChild(t);

    requestAnimationFrame(() => t.style.opacity = "1");

    setTimeout(() => {
        t.style.opacity = "0";
        setTimeout(() => t.remove(), 250);
    }, 900);
}

</script>
</body>
</html>
