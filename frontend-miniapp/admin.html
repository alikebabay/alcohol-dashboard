<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Graph Admin</title>
<link rel="stylesheet" href="/static/admin.css">
<link rel="stylesheet" href="/static/offer.css">
<link rel="stylesheet" href="/static/output.css">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="/static/admin_state.js"></script>
<script src="/static/admin_backend.js"></script>
<script src="/static/admin_editor.js"></script>
<script src="/static/render_offer.js"></script>
<script src="/static/events.js"></script>
</head>

<body>

<h2>Graph Admin</h2>

<div class="container">
    <div class="left">

        <div id="admin_panel">
        <!-- SUPPLIERS -->
        <div class="section-block">
            <h3>Suppliers</h3>

            <div id="supplier_grid"></div>

            <div id="active_supplier"
                 style="font-weight:bold; margin-top:10px; margin-bottom:10px;">
            </div>

            <div class="menu">
                <div class="menu-item" onclick="loadSuppliers()">⟳ Reload Suppliers</div>
                <div class="menu-item" onclick="enterTestMode()">🧪 TEST</div>            

                <div id="btn_change_supplier" class="menu-item"
                     style="display:none;" onclick="resetState()">
                    ❎ Change Supplier
                </div>

                <div id="btn_toggle_excluded"
                    class="menu-item warning"
                    style="display:none;"
                    onclick="toggleExcluded()">
                    🚫 Exclude from pivot
                </div>

                <div id="btn_rebuild_sheets"
                    class="menu-item warning"
                    onclick="rebuildSheets()">
                    🔄 Rebuild Sheets
                </div>

                <div id="btn_nodes" class="menu-item"
                     style="display:none;" onclick="loadNodes()">
                    🔍 Find Nodes
                </div>

                <div id="btn_offers" class="menu-item"
                     style="display:none;" onclick="loadOffers()">
                    📦 View Offers
                </div>

                <div id="btn_remove" class="menu-item danger"
                     style="display:none;" onclick="removeSupplier()">
                    ❌ Remove Supplier
                </div>

                <div id="btn_dfout" class="menu-item danger"
                     style="display:none;" onclick="deleteDfOut()">
                    🗑 Delete all DfOut
                </div>
            </div>
        </div>

        <!-- Mark DfOut as canonical -->
        <div class="section-block" id="dfout_block">
            <h3>Blob ID / DfOut</h3>
            <input id="dfout_id" placeholder="DfOut ID" />
            <button onclick="markCanonical()">⭐ Mark Canonical</button>
        </div>

        <!-- BRAND -->
        <div class="section-block">
            <h3>Brand</h3>
            <input id="brand" placeholder="Brand name" />
            <button onclick="findBrand()">🔍 Find Brand</button>
        </div>
            </div><!-- /admin_panel -->

            <!-- TEST MODE PANEL -->
        <div class="section-block" id="test_panel" style="display:none;">
            <h3>Test input</h3>

            <textarea
                id="test_input"
                placeholder="Paste raw text here..."
                style="width:100%; height:220px;"
            ></textarea>

            <div class="menu" style="margin-top:10px;">
                <div class="menu-item" onclick="runGraphTest()">▶ Test graph</div>
                <div class="menu-item" onclick="testGBX()">▶ Test GBX</div>
                <div class="menu-item" onclick="testPrice()">▶ Test price</div>

                <div class="menu-item danger" onclick="exitTestMode()">
                    ← Return to menu
                </div>
            </div>
        </div>
    </div>

    <div class="right">
        <!-- OUTPUT -->
        <div class="section-block">
            <h3>Output</h3>
            <div id="output" class="result"></div>
        </div>
    </div>
</div>




<script>





//mouse position
let lastMouse = { x: 0, y: 0 };

document.addEventListener("mousemove", e => {
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
});

//event handler for delete button

document.addEventListener("click", async (e) => {
    const btn = e.target.closest(".node-delete");
    if (!btn) return;

    const card = btn.closest("[data-id]");
    if (!card) return;

    const id = card.dataset.id;
    if (!id) return;

    if (!confirm("Delete node?\n" + id)) return;

    const res = await api("/delete_node", "POST", { id }, false);

    if (res?.error) {
        showToastAt(lastMouse.x, lastMouse.y, "Delete failed");
        logEvent(`Delete failed: ${id}`, "error");
        return;
    }

    // ✅ 1. лог пишем ВСЕГДА
    logEvent(`Node deleted: ${id}`, "ok");

    // ✅ 2. toast у мыши
    showToastAt(lastMouse.x, lastMouse.y, "Node deleted");

    // ✅ 3. остаёмся в текущем view
    if (viewMode === "offers") {
        await loadOffers();
    } else {
        await loadNodes();
    }
});


//event handler for download button
document.addEventListener("click", (e) => {
    const btn = e.target.closest(".node-download");
    if (!btn) return;

    const card = btn.closest("[data-id]");
    if (!card) return;

    const id = card.dataset.id;
    if (!id) return;

    // trigger browser download
    window.location = API_BASE + "/download/" + encodeURIComponent(id);
});


// Auto-connect to api when page loads
window.onload = async () => {
    await loadConfig();
    await loadSuppliers();
    renderState();
};

//helper to display copy id when id is copied
function showToast(msg) {
    const t = document.createElement("div");
    t.innerText = msg;
    t.style.position = "absolute";
    t.style.top = "20px";
    t.style.right = "20px";
    t.style.background = "black";
    t.style.color = "white";
    t.style.padding = "10px 16px";
    t.style.borderRadius = "6px";
    t.style.opacity = "0";
    t.style.transition = "opacity 0.25s ease";
    t.style.zIndex = 9999;
    document.body.appendChild(t);

    requestAnimationFrame(() => t.style.opacity = "1");

    setTimeout(() => {
        t.style.opacity = "0";
        setTimeout(() => t.remove(), 250);
    }, 900);
}




</script>
</body>
</html>
