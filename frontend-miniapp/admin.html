<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Supplier Admin</title>
<link rel="stylesheet" href="/static/admin.css">
<link rel="stylesheet" href="/static/editor.css">
<link rel="stylesheet" href="/static/offer.css">
<link rel="stylesheet" href="/static/output.css">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script type="module" src="/static/main.js"></script>
</head>

<body>

<div style="display:flex; align-items:center; gap:12px;">
    <h2 style="margin:0;">Supplier Admin</h2>
    <!-- MAIN MENU BUTTON -->
    <button
        id="btn_main_menu"
        style="
            display:none;
            font-size:12px;
            padding:4px 10px;
            border-radius:6px;
            cursor:pointer;
        "
        title="Return to main menu"
    >
        ⬅ Main menu
    </button>
    <button
        id="btn_pivot"
        style="
            font-size:12px;
            padding:4px 10px;
            border-radius:6px;
            cursor:pointer;
        "
        title="Open pivot table"
    >
        📊 Pivot
    </button>
</div>


<div class="container">
    <div class="left">        
        <!-- SUPPLIERS PANEL PLACEHOLDER -->
        <div id="suppliers_panel_container"></div>
        <div id="test_panel_container"></div>
        <!-- BRAND PANEL PLACEHOLDER (for advanced) -->
        <div id="brand_panel_container"></div>            
    </div>
    <div class="right">
        <!-- OUTPUT - two visibility modes for default and advanced -->
        <div class="section-block">
            <h3>Output</h3>
            <input
                id="offer_search"
                placeholder="🔍 Find offer…"
                style="width:100%; margin-bottom:6px;"
            >            
                <button
                    id="btn_add_offer"                    
                    style="width:100%; margin-bottom:6px;"
                    title="Add offer"
                >
                    ➕ Add offer
                </button>
            
            <div id="output" class="result"></div>            
        </div>
        <!-- MODE CONTROLS (STATE 0) -->
        <div id="mode_controls" class="section-block" style="text-align:center;"></div>
        <!-- BRAND PANEL (DEFAULT MODE ANCHOR) -->
        <div id="brand_anchor_default"></div>
    </div>
</div>


<script>


//mouse position
let lastMouse = { x: 0, y: 0 };

document.addEventListener("mousemove", e => {
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
});



</script>
</body>
</html>
