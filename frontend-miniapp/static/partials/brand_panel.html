<div id="canonical_toast_anchor" style="position: relative;"></div>
<div class="section-block" id="brand_panel">
  <h3>🔍 Brand / Canonical</h3>

  <!-- SEARCH BRAND -->
  <div style="margin-bottom:10px;">
    <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Search brand</div>
    <input
      id="brand_search"
      placeholder="e.g. moet"
      style="width:100%; margin-bottom:6px;"
    />
    <button id="btn_find_brand">🔍 Find brand</button>
    <div id="brand_result" style="font-size:13px; opacity:0.9; margin-top:6px;"></div>
  </div>

  <hr style="opacity:0.2; margin:12px 0;" />

  <!-- CREATE CANONICAL -->
  <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Brand (create)</div>
  <input id="canon_brand" placeholder="e.g. Moët & Chandon" style="width:100%; margin-bottom:6px;" />

  <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Brand Alias</div>
  <input id="brand_alias" placeholder="e.g. Moet Chandon" style="width:100%; margin-bottom:6px;" />

  <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Canonical name</div>
  <input id="canon_name" placeholder="e.g. Moët & Chandon Brut Impérial" style="width:100%; margin-bottom:6px;" />

  <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Series</div>
  <input id="canon_series" placeholder="e.g. Brut Impérial" style="width:100%; margin-bottom:6px;" />

  <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Series Alias</div>
  <input id="series_alias" placeholder="e.g. Brut, Brut Imperial" style="width:100%; margin-bottom:6px;" />

  <div style="font-size:12px; opacity:0.7; margin-bottom:4px;">Category (optional)</div>
  <input id="canon_category" placeholder="e.g. Champagne" style="width:100%; margin-bottom:6px;" />

  <button id="btn_add_canonical">➕ Create canonical</button>
</div>
